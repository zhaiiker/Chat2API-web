name: Build Linux x64 Binary

on:
  push:
    branches:
      - main  # 如果是 master 请自行修改
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Production Build (Frontend & Backend)
        run: npm run build

      - name: Bundle and Package Binary
        run: |
          npx --yes esbuild@latest dist/backend/index.js --bundle --platform=node --target=node22 --outfile=dist/bundle.js
          echo '{"pkg":{"assets":["dist/frontend/**/*"]}}' > temporary-pkg-config.json
          npx --yes @yao-pkg/pkg@latest dist/bundle.js --config temporary-pkg-config.json --targets node22-linux-x64 --output chat2api-web

      # 增加步骤 A：把前端静态文件夹也打包上传，作为备用
      - name: Upload Frontend Static Assets
        uses: actions/upload-artifact@v4
        with:
          name: chat2api-frontend-dist
          path: dist/frontend/
          retention-days: 7

      # 步骤 B：原本的二进制文件保持上传
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat2api-web-linux-x64
          path: chat2api-web
          retention-days: 7
